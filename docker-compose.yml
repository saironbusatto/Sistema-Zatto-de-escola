services:
  ws-server:
    build:
      context: ./apps/ws-server
    container_name: zatto-ws-server
    restart: unless-stopped
    env_file: .env.production
    ports:
      - "3001:3000"
    volumes:
      - ./data/db:/app/db
    networks:
      - zatto-internal
      - albatroz_app-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/room-code"]
      interval: 30s
      timeout: 5s
      retries: 3

  web:
    build:
      context: ./apps/web
    container_name: zatto-web
    restart: unless-stopped
    env_file: .env.production
    ports:
      - "3000:3000"
    depends_on:
      ws-server:
        condition: service_healthy
    networks:
      - zatto-internal
      - albatroz_app-network

networks:
  zatto-internal:
    driver: bridge
  albatroz_app-network:
    external: true
