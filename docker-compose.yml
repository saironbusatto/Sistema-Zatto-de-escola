services:
  app:
    build: .
    container_name: plataforma-curso-app
    restart: unless-stopped
    env_file:
      - .env.production
    ports:
      - "3010:3000"
    volumes:
      - ./db:/app/db
      - ./data:/app/data
    networks:
      - plataforma-curso-net
      - albatroz_app-network

networks:
  plataforma-curso-net:
    driver: bridge
  albatroz_app-network:
    external: true
