<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — Zatto Escola</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#0d1117;color:#e6edf3;font-family:'IBM Plex Sans',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}
.card{background:#161b22;border:1px solid #30363d;border-radius:12px;padding:40px 36px;width:100%;max-width:380px;}
.brand{margin-bottom:28px;}
.badge{display:inline-block;background:#58a6ff;color:#0d1117;font-size:10px;font-weight:700;letter-spacing:.1em;padding:2px 9px;border-radius:4px;font-family:'IBM Plex Mono',monospace;margin-bottom:12px;}
h1{font-size:20px;font-weight:600;color:#e6edf3;}
.sub{font-size:12px;color:#7d8590;margin-top:4px;}
.field{display:flex;flex-direction:column;gap:6px;margin-bottom:16px;}
label{font-size:11px;font-weight:600;letter-spacing:.06em;color:#7d8590;text-transform:uppercase;}
input{background:#0d1117;border:1.5px solid #30363d;border-radius:6px;padding:10px 14px;font-size:14px;color:#e6edf3;font-family:'IBM Plex Sans',sans-serif;transition:border-color .2s;width:100%;}
input:focus{outline:none;border-color:#58a6ff;}
input::placeholder{color:#3d444d;}
.btn{background:#58a6ff;color:#0d1117;border:none;border-radius:6px;padding:11px;font-size:14px;font-weight:700;cursor:pointer;width:100%;font-family:'IBM Plex Sans',sans-serif;transition:opacity .2s;margin-top:4px;}
.btn:hover{opacity:.88;}
.btn:disabled{opacity:.4;cursor:default;}
.erro{background:rgba(248,81,73,.1);border:1px solid rgba(248,81,73,.3);border-radius:6px;padding:9px 14px;font-size:12px;color:#f85149;display:none;margin-top:12px;}
.erro.show{display:block;}
</style>
</head>
<body>
<div class="card">
  <div class="brand">
    <span class="badge">ADMIN</span>
    <h1>Zatto Escola</h1>
    <p class="sub">Painel de administração de conteúdo</p>
  </div>

  <form id="form" onsubmit="login(event)">
    <div class="field">
      <label for="username">Usuário</label>
      <input type="text" id="username" name="username" autocomplete="username"
        placeholder="admin" required maxlength="80">
    </div>
    <div class="field">
      <label for="password">Senha</label>
      <input type="password" id="password" name="password" autocomplete="current-password"
        placeholder="••••••••" required maxlength="200">
    </div>
    <button class="btn" id="btn" type="submit">Entrar →</button>
    <div class="erro" id="erro"></div>
  </form>
</div>

<script>
async function login(e) {
  e.preventDefault();
  const btn  = document.getElementById('btn');
  const erro = document.getElementById('erro');
  erro.classList.remove('show');
  btn.disabled = true;
  btn.textContent = 'Entrando...';

  try {
    const res = await fetch('/api/admin/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        username: document.getElementById('username').value,
        password: document.getElementById('password').value,
      }),
    });

    if (res.ok) {
      window.location.href = '/admin/dashboard.html';
    } else {
      const data = await res.json();
      erro.textContent = data.erro || 'Credenciais inválidas';
      erro.classList.add('show');
    }
  } catch {
    erro.textContent = 'Erro de conexão. Tente novamente.';
    erro.classList.add('show');
  }

  btn.disabled = false;
  btn.textContent = 'Entrar →';
}
</script>
</body>
</html>
